<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CHATDIARY</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2ec;
        --bg-soft: #f5efe8;
        --primary: #b3262d;
        --primary-dark: #941e24;
        --text: #3a2c2a;
        --text-soft: #6a5b58;
        --border: #d8c8bf;
        --lavender: #d9c7eb;
        --pink: #f2c9c9;
        --yellow: #f3d88d;
        --ivory-card: #eaddcb;
        --white: #fffdfc;
        --paper: var(--white);
        --paper-soft: var(--bg-soft);
        --ink: var(--text);
        --muted: var(--text-soft);
        --line: var(--primary);
        --line-soft: var(--border);
        --accent: var(--primary);
        --accent-soft: #f4e2de;
        --shadow: 0 18px 42px rgba(89, 55, 45, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 56px;
      }

      .screen {
        display: none;
      }

      .screen.is-active {
        display: block;
        animation: screenIn 380ms ease both;
      }

      .screen-opening.is-active {
        display: grid;
        min-height: calc(100vh - 90px);
        place-items: center;
      }

      .page[data-screen="opening"] .app-status {
        display: none;
      }

      .opening-inner {
        width: min(720px, 100%);
        padding: 44px 0;
        text-align: center;
      }

      .opening-title {
        margin: 0;
        color: var(--primary);
        font-family: Impact, "Arial Black", "Yu Gothic", sans-serif;
        font-size: clamp(5rem, 16vw, 12rem);
        font-weight: 900;
        letter-spacing: -0.025em;
        line-height: 0.82;
        animation: openingFade 520ms ease both;
      }

      .opening-title span {
        display: block;
      }

      .opening-copy {
        margin: 28px 0 0;
        color: var(--primary);
        font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
        font-size: clamp(1.1rem, 2.5vw, 1.45rem);
        letter-spacing: 0.08em;
      }

      .opening-button {
        margin-top: 34px;
        min-width: 160px;
        animation: openingFade 520ms ease 180ms both;
      }

      .screen-nav {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .screen-heading {
        max-width: 760px;
        margin-bottom: 18px;
      }

      .screen-heading h2 {
        margin: 0 0 10px;
        color: var(--primary);
        font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
        font-size: clamp(1.55rem, 3vw, 2.25rem);
        line-height: 1.25;
      }

      .screen-heading p {
        margin: 0 0 8px;
        color: var(--muted);
      }

      .input-panel {
        max-width: 820px;
      }

      .candidates-panel {
        width: 100%;
      }

      @keyframes screenIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes openingFade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hero {
        padding: 28px 0 22px;
        border-bottom: 1px solid color-mix(in srgb, var(--primary) 34%, var(--border));
      }

      .hero h1 {
        margin: 0;
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "Times New Roman", serif;
        font-size: clamp(2.1rem, 5vw, 4rem);
        font-weight: 600;
        letter-spacing: 0;
        color: var(--primary);
      }

      .hero p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .intro {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        gap: 22px;
        padding: 26px 0;
      }

      .intro-text,
      .steps,
      .panel {
        background: color-mix(in srgb, var(--white) 86%, var(--ivory-card));
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .intro-text {
        border-top-color: color-mix(in srgb, var(--primary) 42%, var(--border));
      }

      .intro-text {
        padding: 22px;
      }

      .intro-text p {
        margin: 0 0 14px;
      }

      .intro-text p:last-child {
        margin-bottom: 0;
      }

      .steps {
        padding: 20px 22px;
        background: color-mix(in srgb, var(--yellow) 30%, var(--white));
      }

      .steps h2,
      .panel h2 {
        margin: 0 0 12px;
        color: var(--primary);
        font-size: 1.08rem;
      }

      .steps ol {
        display: grid;
        gap: 10px;
        margin: 0;
        padding-left: 1.35rem;
      }

      .steps li::marker {
        color: var(--accent);
        font-weight: 700;
      }

      .status {
        min-height: 42px;
        margin: 0 0 18px;
        padding: 10px 14px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: color-mix(in srgb, var(--white) 88%, var(--pink));
        color: var(--muted);
      }

      .status.is-active {
        border-color: color-mix(in srgb, var(--primary) 55%, var(--border));
        color: var(--ink);
      }

      .status.is-error {
        border-color: var(--primary);
        color: var(--primary-dark);
        background: color-mix(in srgb, var(--pink) 38%, var(--white));
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(360px, 1.05fr);
        gap: 22px;
        align-items: start;
      }

      .panel {
        padding: 20px;
      }

      .label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--white);
        color: var(--ink);
        outline: none;
      }

      textarea:focus,
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(179, 38, 45, 0.14);
      }

      #talkInput {
        min-height: 330px;
        resize: vertical;
        padding: 14px;
        white-space: pre-wrap;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .button {
        min-height: 44px;
        border-radius: 999px;
        border: 1px solid var(--primary);
        padding: 0 18px;
        background: var(--primary);
        color: var(--white);
        box-shadow: 0 8px 18px rgba(179, 38, 45, 0.16);
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      }

      .button.secondary {
        background: color-mix(in srgb, var(--white) 82%, var(--ivory-card));
        color: var(--primary);
      }

      .button:hover {
        background: var(--primary-dark);
        border-color: var(--primary-dark);
        color: var(--white);
      }

      .button:hover,
      .candidate-card:hover {
        transform: translateY(-1px);
      }

      .candidate-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .empty {
        margin: 0;
        padding: 22px;
        border: 1px dashed var(--line-soft);
        border-radius: 8px;
        color: var(--muted);
        background: color-mix(in srgb, var(--white) 76%, var(--lavender));
      }

      .candidate-card {
        display: block;
        width: 100%;
        min-height: 178px;
        padding: 14px;
        text-align: left;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--paper);
        color: var(--ink);
        box-shadow: 0 10px 24px rgba(93, 60, 48, 0.06);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .candidate-card:nth-child(4n + 1) {
        background: color-mix(in srgb, var(--white) 82%, var(--ivory-card));
      }

      .candidate-card:nth-child(4n + 2) {
        background: color-mix(in srgb, var(--white) 84%, var(--lavender));
      }

      .candidate-card:nth-child(4n + 3) {
        background: color-mix(in srgb, var(--white) 84%, var(--pink));
      }

      .candidate-card:nth-child(4n + 4) {
        background: color-mix(in srgb, var(--white) 78%, var(--yellow));
      }

      .candidate-card.is-selected {
        border-color: var(--primary);
        background: var(--accent-soft);
        box-shadow: inset 0 0 0 1px var(--primary), 0 12px 28px rgba(179, 38, 45, 0.1);
      }

      .candidate-date,
      .source-label,
      .theme-label {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .candidate-card h3 {
        margin: 6px 0 8px;
        color: var(--primary);
        font-size: 1.06rem;
      }

      .source-label {
        margin-bottom: 8px;
      }

      .theme-label {
        margin: 8px 0 0;
        font-weight: 700;
      }

      .ai-badge {
        display: inline-block;
        margin: 6px 0 0;
        color: var(--primary);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .excerpt {
        margin: 0;
        color: var(--ink);
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "Times New Roman", serif;
        font-size: 0.92rem;
      }

      .editor-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(280px, 1.1fr);
        gap: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 13px;
      }

      .field input {
        min-height: 42px;
        padding: 8px 11px;
      }

      #bodyEdit {
        min-height: 260px;
        padding: 12px;
        resize: vertical;
      }

      .preview-wrap {
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .preview-lead {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .sticker-heading {
        margin: 0 0 6px;
        color: var(--primary);
        font-size: 1rem;
      }

      .sticker-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .theme-controls {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: color-mix(in srgb, var(--white) 80%, var(--lavender));
      }

      .theme-control-row {
        display: grid;
        grid-template-columns: minmax(120px, 0.55fr) minmax(0, 1fr);
        gap: 10px;
        align-items: center;
      }

      .theme-select,
      .shape-select {
        min-height: 40px;
        width: 100%;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--white);
        color: var(--ink);
        padding: 8px 10px;
      }

      .theme-recommendation {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .sticker-sheet {
        display: flex;
        justify-content: center;
        padding: 38px 18px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(179, 38, 45, 0.08) 0,
            rgba(179, 38, 45, 0.08) 1px,
            transparent 1px,
            transparent 28px
          ),
          color-mix(in srgb, var(--ivory-card) 50%, var(--white));
      }

      .print-area {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      .story-sticker {
        --sticker-bg: #f6f1e7;
        --sticker-text: #5e5247;
        --sticker-line: #5e5247;
        position: relative;
        isolation: isolate;
        box-sizing: border-box;
        width: min(100%, 300px);
        min-height: auto;
        padding: 24px 24px 28px;
        border: 1.4px solid var(--sticker-line);
        border-radius: 2px;
        margin: 0 auto;
        overflow: visible;
        background: var(--sticker-bg);
        color: var(--sticker-text);
        font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", "BIZ UDPMincho", serif;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .story-sticker::before {
        content: "";
        position: absolute;
        inset: 10px;
        border: 1px solid var(--sticker-line);
        border-radius: inherit;
        opacity: 0.45;
        pointer-events: none;
        z-index: 1;
      }

      .drop-svg,
      .drop-decor {
        display: none;
      }

      .story-content {
        position: relative;
        z-index: 2;
      }

      .drop-preview {
        display: contents;
      }

      .story-date,
      .story-title,
      .story-divider,
      .story-body {
        position: relative;
        z-index: 2;
      }

      .story-date {
        margin: 0 0 14px;
        color: var(--sticker-text);
        font-size: 12px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
        line-height: 1.2;
        text-align: right;
      }

      .story-title {
        margin: 0 0 8px;
        color: var(--sticker-text);
        font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", "BIZ UDPMincho", serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.25;
        word-break: keep-all;
        overflow-wrap: anywhere;
      }

      .story-divider {
        width: 100%;
        height: 1px;
        margin: 0 0 18px;
        background: var(--sticker-line);
      }

      .story-divider::after {
        content: none;
      }

      .story-body {
        margin: 0;
        color: var(--sticker-text);
        font-size: 13.5px;
        letter-spacing: 0.035em;
        line-height: 1.95;
        text-align: left;
        overflow: visible;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .story-body p {
        margin: 0 0 1.1em;
      }

      .story-body p:last-child {
        margin-bottom: 0;
      }

      .theme-sky {
        --sticker-bg: #e7edf0;
        --sticker-text: #4f585b;
        --sticker-line: #8f9ca2;
      }

      .theme-ivory {
        --sticker-bg: #eaddcb;
        --sticker-text: #3a2c2a;
        --sticker-line: #b3262d;
      }

      .theme-pink {
        --sticker-bg: #f2c9c9;
        --sticker-text: #5f3a3b;
        --sticker-line: #b3262d;
      }

      .theme-beige {
        --sticker-bg: #eaddcb;
        --sticker-text: #4f3c36;
        --sticker-line: #9b6f62;
      }

      .theme-lavender {
        --sticker-bg: #d9c7eb;
        --sticker-text: #4f3f5f;
        --sticker-line: #7c6693;
      }

      .theme-yellow {
        --sticker-bg: #f3d88d;
        --sticker-text: #5c4a2d;
        --sticker-line: #b3262d;
      }

      .shape-long {
        width: min(100%, 300px);
        min-height: auto;
        padding: 26px 26px 30px;
        border-radius: 2px;
      }

      .shape-long::before {
        inset: 10px;
        border-radius: 1px;
        opacity: 0.62;
      }

      .shape-long .story-title {
        font-size: 28px;
      }

      .shape-card {
        width: min(100%, 310px);
        min-height: auto;
        padding: 30px 32px 32px;
        border-radius: 18px;
        box-shadow: 0 9px 22px rgba(70, 58, 45, 0.12);
      }

      .shape-card::before {
        inset: 11px;
        border-radius: 13px;
        opacity: 0.5;
      }

      .shape-label {
        width: min(100%, 430px);
        min-height: auto;
        padding: 26px 42px 24px 92px;
        border-radius: 18px;
        background:
          radial-gradient(circle at left center, var(--bg-soft) 0 23px, transparent 24px),
          radial-gradient(circle at right center, var(--bg-soft) 0 23px, transparent 24px),
          var(--sticker-bg);
        box-shadow: 0 8px 18px rgba(97, 61, 70, 0.12);
      }

      .shape-label::before {
        inset: 10px 16px;
        border-radius: 12px;
        opacity: 0.58;
      }

      .shape-label::after {
        content: "♥";
        position: absolute;
        right: 28px;
        bottom: 16px;
        z-index: 1;
        color: var(--sticker-line);
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: 20px;
        line-height: 1;
        opacity: 0.62;
      }

      .shape-label .story-date {
        margin-bottom: 10px;
      }

      .shape-label .story-title {
        font-size: 25px;
        margin-bottom: 10px;
      }

      .shape-label .story-divider {
        position: relative;
        margin-bottom: 12px;
      }

      .shape-label .story-divider::before {
        content: "";
        position: absolute;
        left: -40px;
        top: -62px;
        width: 1px;
        height: 126px;
        border-left: 1.4px dashed var(--sticker-line);
        opacity: 0.48;
      }

      .shape-label .story-body {
        line-height: 1.75;
      }

      .shape-round {
        width: min(100%, 330px);
        min-height: 340px;
        padding: 46px 42px 50px;
        border-radius: 48% 48% 44% 44% / 50% 50% 47% 47%;
        box-shadow: 0 9px 20px rgba(91, 72, 55, 0.12);
      }

      .shape-round::before {
        inset: 13px;
        border-style: dotted;
        border-radius: inherit;
        opacity: 0.48;
      }

      .shape-round::after {
        content: "❧";
        position: absolute;
        left: 50%;
        bottom: 22px;
        z-index: 1;
        color: var(--sticker-line);
        font-size: 24px;
        line-height: 1;
        transform: translateX(-50%) rotate(-8deg);
        opacity: 0.5;
      }

      .shape-round .story-title {
        text-align: left;
      }

      .shape-round .story-divider {
        background: repeating-linear-gradient(
          to right,
          var(--sticker-line) 0 3px,
          transparent 3px 7px
        );
        opacity: 0.78;
      }

      .shape-drop {
        width: min(100%, 460px);
        min-height: 0;
        padding: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        color: var(--sticker-text);
        box-shadow: none;
      }

      .shape-drop::before,
      .shape-drop::after {
        content: none;
      }

      .drop-template {
        display: none;
      }

      .shape-drop .drop-preview {
        display: block;
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
      }

      .shape-drop .drop-template {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
        user-select: none;
      }

      .shape-drop .story-content {
        display: contents;
      }

      .shape-drop .story-date,
      .shape-drop .drop-date {
        position: absolute;
        top: 30.5%;
        left: 52%;
        width: 17%;
        min-height: 16px;
        margin: 0;
        font-size: 10.5px;
        font-weight: 570;
        letter-spacing: 0.02em;
        line-height: 1.2;
        text-align: right;
      }

      .shape-drop .story-title,
      .shape-drop .drop-title {
        position: absolute;
        top: 35.2%;
        left: 27.8%;
        width: 41.4%;
        min-height: 0;
        margin: 0;
        font-size: 25px;
        line-height: 1.16;
        letter-spacing: 0.035em;
        text-align: left;
        overflow-wrap: anywhere;
      }

      .shape-drop .story-divider {
        position: absolute;
        top: 45.3%;
        left: 24.6%;
        width: 48.8%;
        height: 1.5px;
        margin: 0;
        opacity: 0;
      }

      .shape-drop .story-body,
      .shape-drop .drop-body {
        position: absolute;
        top: 45%;
        right: 28.8%;
        bottom: 23%;
        left: 26.8%;
        width: auto;
        font-size: 12.5px;
        font-weight: 520;
        letter-spacing: 0.01em;
        line-height: 1.3;
        text-align: left;
        box-sizing: border-box;
        overflow: visible;
      }

      .shape-ticket {
        width: min(100%, 440px);
        min-height: auto;
        padding: 28px 46px 28px 108px;
        border-radius: 14px;
        background:
          radial-gradient(circle at left center, var(--bg-soft) 0 21px, transparent 22px),
          radial-gradient(circle at right center, var(--bg-soft) 0 21px, transparent 22px),
          var(--sticker-bg);
        box-shadow: 0 9px 20px rgba(102, 84, 45, 0.12);
      }

      .shape-ticket::before {
        inset: 12px 19px;
        border-radius: 10px;
        opacity: 0.6;
      }

      .shape-ticket::after {
        content: "★";
        position: absolute;
        left: 34px;
        bottom: 30px;
        z-index: 1;
        color: var(--sticker-line);
        font-size: 25px;
        line-height: 1;
        opacity: 0.5;
      }

      .shape-ticket .story-title {
        font-size: 28px;
      }

      .shape-ticket .story-divider {
        position: relative;
      }

      .shape-ticket .story-divider::before {
        content: "";
        position: absolute;
        left: -45px;
        top: -70px;
        width: 1px;
        height: 156px;
        border-left: 1.4px dashed var(--sticker-line);
        opacity: 0.45;
      }

      .text-large .story-body {
        font-size: 15px;

          return true;
        }

        async function generateCandidatesWithGemini(text) {
          const response = await fetch(STORY_API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              talkText: text
            })
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error("API returned " + response.status + ": " + errorText);
          }

          const data = await response.json();

          if (!data || !Array.isArray(data.candidates)) {
            throw new Error("API response format was invalid");
          }

          return data.candidates.slice(0, 3).map(function (candidate, index) {
            const title = String(candidate.title || "小さな会話").trim();
            const body = String(candidate.body || "").trim();
            const topicList = Array.isArray(candidate.topics)
              ? candidate.topics.map(function (topic) {
                  return String(topic || "").trim();
                }).filter(Boolean).slice(0, 4)
              : [];
            const topicText = topicList.length > 0 ? topicList.join("、") : "AIが抽出した話題";
            const stickerType = getStickerDesign(title, body, text + "\n" + topicText);

            return {
              id: "ai-" + index + "-" + Date.now(),
              date: String(candidate.date || detectFirstDate(text)).trim() || "日付なし",
              title: title,
              topic: topicText,
              topics: topicList,
              body: body,
              shapeId: stickerType.shapeId,
              themeId: stickerType.themeId,
              layoutId: stickerType.layoutId,
              sizeClass: stickerType.sizeClass,
              score: 10,
              source: "ai"
            };
          }).filter(function (candidate) {
            return candidate.body.length > 0;
          });
        }

        function buildCandidates(text) {
          const blocks = splitByDate(text);
          const found = [];
          const used = new Set();

          blocks.forEach(function (block) {
            const lowerText = block.text.toLowerCase();

            STORY_RULES.forEach(function (rule) {
              const matchedKeywords = rule.keywords.filter(function (keyword) {
                return lowerText.includes(keyword.toLowerCase());
              });

              if (matchedKeywords.length < rule.minHits) {
                return;
              }

              const key = block.date + "-" + rule.id;
              if (used.has(key)) {
                return;
              }

              used.add(key);
              const titleValue = typeof rule.title === "function" ? rule.title(lowerText) : rule.title;
              const stickerType = getStickerDesign(titleValue, rule.body, block.text);
              found.push({
                id: rule.id,
                date: block.date,
                title: titleValue,
                topic: rule.topic,
                body: rule.body,
                shapeId: stickerType.shapeId,
                themeId: stickerType.themeId,
                layoutId: stickerType.layoutId,
                sizeClass: stickerType.sizeClass,
                score: matchedKeywords.length
              });
            });
          });

          return found.slice(0, 6);
        }

        function buildGenericCandidate(text) {
          const stickerType = getStickerDesign(GENERIC_STORY.title, GENERIC_STORY.body, text);
          return {
            id: GENERIC_STORY.id,
            date: detectFirstDate(text),
            title: GENERIC_STORY.title,
            topic: GENERIC_STORY.topic,
            body: GENERIC_STORY.body,
            shapeId: stickerType.shapeId,
            themeId: stickerType.themeId,
            layoutId: stickerType.layoutId,
            sizeClass: stickerType.sizeClass,
            score: 0
          };
        }

        function splitByDate(text) {
          const lines = text.split(/\r?\n/);
          const blocks = [];
          let current = { date: "日付なし", text: "" };
          const dateLine = /^\s*(\d{4}[\/.-]\d{1,2}[\/.-]\d{1,2}(?:\(.+?\))?)\s*$/;

          lines.forEach(function (line) {
            const dateMatch = line.match(dateLine);
            if (dateMatch) {
              if (current.text.trim()) {
                blocks.push(current);
              }
              current = { date: dateMatch[1], text: line + "\n" };
              return;
            }

            current.text += line + "\n";
          });

          if (current.text.trim()) {
            blocks.push(current);
          }

          return blocks.length > 0 ? blocks : [{ date: "日付なし", text: text }];
        }

        function detectFirstDate(text) {
          const match = text.match(/\d{4}[\/.-]\d{1,2}[\/.-]\d{1,2}(?:\(.+?\))?/);
          return match ? match[0] : "日付なし";
        }

        function maskSensitiveText(text) {
          return text
            .replace(/https?:\/\/[^\s]+/gi, "リンク")
            .replace(/line\.me\/[^\s]+/gi, "リンク")
            .replace(/(?:pay|payment)[^\s]*/gi, "リンク");
        }

        function renderCandidates() {
          elements.candidateList.innerHTML = "";

          if (candidates.length === 0) {
            const empty = document.createElement("p");
            empty.className = "empty";
            empty.textContent = "まだ候補はありません。会話を貼って「小説候補をつくる」を押してください。";
            elements.candidateList.appendChild(empty);
            return;
          }

          candidates.forEach(function (candidate, index) {
            const card = document.createElement("button");
            card.type = "button";
            card.className = "candidate-card" + (index === selectedIndex ? " is-selected" : "");
            card.setAttribute("aria-pressed", index === selectedIndex ? "true" : "false");

            const date = document.createElement("span");
            date.className = "candidate-date";
            date.textContent = candidate.date;

            const title = document.createElement("h3");
            title.textContent = candidate.title;

            const topic = document.createElement("span");
            topic.className = "source-label";
            topic.textContent = "抽出した話題: " + candidate.topic;

            const source = document.createElement("span");
            source.className = "ai-badge";
            source.textContent = "AI生成";

            const theme = document.createElement("span");
            theme.className = "theme-label";
            theme.textContent = "おすすめ：" + getLayoutLabel(candidate.layoutId) + " / " + getStickerTypeText(candidate.shapeId, candidate.themeId);

            const excerpt = document.createElement("p");
            excerpt.className = "excerpt";
            excerpt.textContent = firstParagraph(candidate.body);

            card.appendChild(date);
            card.appendChild(title);
            card.appendChild(topic);
            if (candidate.source === "ai") {
              card.appendChild(source);
            }
            card.appendChild(theme);
            card.appendChild(excerpt);

            card.addEventListener("click", function () {
              console.log("候補カード button clicked", candidate.title);
              try {
                selectCandidate(index);
                showScreen("editor");
              } catch (error) {
                handleError(error);
              }
            });

            elements.candidateList.appendChild(card);
          });
        }

        function selectCandidate(index) {
          const candidate = candidates[index];
          if (!candidate) {
            return;
          }

          selectedIndex = index;
          elements.dateEdit.value = candidate.date;
          elements.titleEdit.value = candidate.title;
          elements.bodyEdit.value = candidate.body;
          selectedShapeId = "roll";
          selectedThemeId = getTheme(candidate.themeId).id;
          selectedLayoutId = getLayout(candidate.layoutId).id;
          selectedSizeClass = candidate.sizeClass || "text-medium";
          isManualLayout = false;
          isManualTheme = false;
          elements.layoutSelect.value = selectedLayoutId;
          elements.themeSelect.value = selectedThemeId;
          applyStickerStyle(selectedShapeId, selectedThemeId, selectedSizeClass, "おすすめ");
          renderCandidates();
          updatePreview();
        }

        function clearEditor() {
          elements.dateEdit.value = "";
          elements.titleEdit.value = "";
          elements.bodyEdit.value = "";
          selectedShapeId = "roll";
          selectedThemeId = "lilac";
          selectedLayoutId = "medium";
          selectedSizeClass = "text-medium";
          isManualLayout = false;
          isManualTheme = false;
          elements.layoutSelect.value = selectedLayoutId;
          elements.themeSelect.value = selectedThemeId;
          applyStickerStyle(selectedShapeId, selectedThemeId, selectedSizeClass, "おすすめ");
          updatePreview();
        }

        function updatePreview() {
          const rawTitle = elements.titleEdit.value.trim();
          const rawBody = elements.bodyEdit.value.trim();
          const title = rawTitle || "まだシールがありません";
          const body = rawBody || "候補を選ぶと、ここに内容に合った形と色のシールが表示されます。";

          if (rawTitle || rawBody) {
            const design = getStickerDesign(title, body, "");
            selectedShapeId = design.shapeId;
            if (!isManualLayout) {
              selectedLayoutId = design.layoutId;
            }
            if (!isManualTheme) {
              selectedThemeId = design.themeId;
            }
            selectedSizeClass = design.sizeClass;
            elements.layoutSelect.value = selectedLayoutId;
            elements.themeSelect.value = selectedThemeId;
            applyStickerStyle(selectedShapeId, selectedThemeId, selectedSizeClass, "おすすめ");
          }

          elements.previewDate.textContent = elements.dateEdit.value.trim() || "日付なし";
          elements.previewTitle.textContent = title;
          renderStoryBody(body);
          fitStickerLayout("おすすめ");
        }

        function renderStoryBody(text) {
          elements.previewBody.innerHTML = "";
          elements.previewBody.style.removeProperty("font-size");
          elements.previewBody.style.removeProperty("line-height");
          const paragraphs = text.split(/\n\s*\n/).map(function (paragraph) {
            return paragraph.trim();
          }).filter(Boolean);

          paragraphs.forEach(function (paragraph) {
            const p = document.createElement("p");
            p.textContent = paragraph;
            elements.previewBody.appendChild(p);
          });
        }

        function setupLayoutSelect() {
          STICKER_LAYOUTS.forEach(function (layout) {
            const option = document.createElement("option");
            option.value = layout.id;
            option.textContent = layout.label;
            elements.layoutSelect.appendChild(option);
          });
          elements.layoutSelect.value = selectedLayoutId;
        }

        function setupThemeSelect() {
          STICKER_THEMES.forEach(function (theme) {
            const option = document.createElement("option");
            option.value = theme.id;
            option.textContent = theme.label;
            elements.themeSelect.appendChild(option);
          });
          elements.themeSelect.value = selectedThemeId;
        }

        function applyStickerStyle(shapeId, themeId, sizeClass, labelPrefix) {
          const shape = getShape(shapeId);
          const theme = getTheme(themeId);
          const layout = getLayout(selectedLayoutId);
          const safeSizeClass = ["text-large", "text-medium", "text-small", "text-xsmall"].includes(sizeClass) ? sizeClass : "text-medium";
          elements.storySticker.className = "story-sticker shape-" + shape.id + " layout-" + layout.id + " theme-" + theme.id + " " + safeSizeClass;
          elements.storySticker.style.setProperty("--sticker-bg", theme.bg);
          elements.storySticker.style.setProperty("--sticker-text", theme.ink);
          elements.storySticker.style.setProperty("--sticker-line", theme.line);
          elements.themeRecommendation.textContent = (labelPrefix || "おすすめ") + "：" + layout.label + " / " + getStickerTypeText(shape.id, theme.id);
        }

        function getShape(shapeId) {
          return STICKER_SHAPES.find(function (shape) {
            return shape.id === shapeId;
          }) || STICKER_SHAPES[0];
        }

        function getTheme(themeId) {
          return STICKER_THEMES.find(function (theme) {
            return theme.id === themeId;
          }) || STICKER_THEMES[0];
        }

        function getLayout(layoutId) {
          return STICKER_LAYOUTS.find(function (layout) {
            return layout.id === layoutId;
          }) || STICKER_LAYOUTS[2];
        }

        function getShapeLabel(shapeId) {
          const shape = getShape(shapeId);
          return shape.label;
        }

        function getThemeLabel(themeId) {
          const theme = getTheme(themeId);
          return theme.label;
        }

        function getLayoutLabel(layoutId) {
          return getLayout(layoutId).label;
        }

        function getStickerTypeText(shapeId, themeId) {
          return getTheme(themeId).label;
        }

        function getStickerDesign(title, body, sourceText) {
          const text = title + "\n" + body + "\n" + (sourceText || "");
          const length = countStoryChars(body);
          const isRainy = /雨|濡れる|濡れ|傘|夜|怖い|怖|不安|寂しい|寂|待つ|待|まだ|ごめん/.test(text);
          const isWarm = /迎え|安心|ありがとう|待ち合わせ|ついた|来てくれる|やさし|優し|ほっと/.test(text);
          const isEvent = /花束|メイク|遊ぶ|遊び|おでかけ|ライブ|イベント|駅|集合|予定/.test(text);
          const isSchool = /課題|レポート|参考文献|AI|ai|授業|提出|確認|学校/.test(text);

          let themeId = "lilac";
          if (isRainy) {
            themeId = "blue";
          } else if (isWarm) {
            themeId = "mint";
          } else if (isEvent) {
            themeId = "orange";
          } else if (isSchool) {
            themeId = "silver";
          } else if (length <= 90) {
            themeId = "pink";
          }

          const layoutId = getLayoutForLength(length);
          let sizeClass = "text-medium";
          if (length > 720) {
            sizeClass = "text-xsmall";
          } else if (length > 520) {
            sizeClass = "text-small";
          } else if (length <= 80) {
            sizeClass = "text-large";
          }

          return {
            shape: "shape-roll",
            theme: "theme-" + themeId,
            shapeId: "roll",
            themeId: themeId,
            layoutId: layoutId,
            sizeClass: sizeClass,
            length: length
          };
        }

        function countStoryChars(text) {
          return (text || "").replace(/\s/g, "").length;
        }

        function getLayoutForLength(length) {
          if (length <= 120) {
            return "poem";
          }

          if (length <= 220) {
            return "short";
          }

          if (length <= 380) {
            return "medium";
          }

          return "long";
        }

        function getSafeShapeForLength(shapeId, length) {
          return "roll";
        }

        function fitStickerLayout(labelPrefix) {
          selectedShapeId = "roll";
          elements.layoutSelect.value = selectedLayoutId;
          applyStickerStyle(selectedShapeId, selectedThemeId, selectedSizeClass, labelPrefix || "おすすめ");
        }

        function firstParagraph(text) {
          return text.split(/\n\s*\n/)[0];
        }

        function clearStatus() {
          elements.statusMessage.textContent = "";
          elements.statusMessage.classList.remove("is-active", "is-error");
        }

        function setGenerating(isLoading) {
          isGenerating = Boolean(isLoading);
          elements.generateButton.disabled = isGenerating;
          elements.sampleButton.disabled = isGenerating;
          elements.generateButton.classList.toggle("is-loading", isGenerating);
          elements.generateButton.textContent = isGenerating ? "生成中..." : "小説候補をつくる";
          elements.generateLoading.classList.toggle("is-active", isGenerating);
          if (isGenerating) {
            setStatus("小説候補を作成しています…");
          }
        }

        function setStatus(message, isError) {
          elements.statusMessage.textContent = message;
          elements.statusMessage.classList.add("is-active");
          elements.statusMessage.classList.toggle("is-error", Boolean(isError));
        }

        function handleError(error) {
          console.error(error);
          setStatus("エラーが起きました。もう一度試してください", true);
        }
      });
    </script>
  </body>
